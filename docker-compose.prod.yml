services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: caraser
      POSTGRES_USER: caraser
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caraser -d caraser"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8050:8000"
    volumes:
      - ./config/settings_local.py:/app/config/settings_local.py:ro
      - ./media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3050:80"
    restart: unless-stopped

volumes:
  postgres_data:
