# VPS nginx configuration for caraser
#
# Initial setup (first-time — certificates don't exist yet):
#   1. Install certbot:    sudo apt install certbot python3-certbot-nginx
#   2. Copy only the HTTP block to nginx so it can start without certificates:
#        sudo bash -c 'cat > /etc/nginx/sites-available/caraser' << 'EOF'
#        server {
#            listen 80;
#            server_name caraser.org www.caraser.org;
#            location /.well-known/acme-challenge/ { root /var/www/html; }
#            location / { return 301 https://caraser.org$request_uri; }
#        }
#        EOF
#   3. Enable & reload:    sudo ln -s /etc/nginx/sites-available/caraser /etc/nginx/sites-enabled/
#                          sudo nginx -t && sudo systemctl reload nginx
#   4. Obtain certificate: sudo certbot certonly --webroot -w /var/www/html -d caraser.org -d www.caraser.org
#   5. Copy this full file: sudo cp caraser.conf /etc/nginx/sites-available/caraser
#   6. Test & reload:      sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name caraser.org www.caraser.org;

    # Allow certbot webroot renewals
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://caraser.org$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.caraser.org;

    ssl_certificate /etc/letsencrypt/live/caraser.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caraser.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://caraser.org$request_uri;
}

server {
    listen 443 ssl;
    server_name caraser.org;

    ssl_certificate /etc/letsencrypt/live/caraser.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/caraser.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location /api/ {
        proxy_pass http://127.0.0.1:8050;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8050;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:8050;
    }

    location /media/ {
        alias /home/bart/caraser/media/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3050;
    }
}
