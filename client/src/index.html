<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="manifest" href="site.webmanifest" />

    <!-- ssr:meta:start -->
    <title>Caraser – See your street without cars</title>
    <meta name="theme-color" content="#2e7d32" />
    <meta
      name="description"
      content="Upload a street photo and see what it looks like without cars. Caraser uses AI to replace cars with trees, benches, greenery and people."
    />
    <link rel="canonical" href="https://caraser.org/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Caraser" />
    <meta property="og:url" content="https://caraser.org/" />
    <meta property="og:title" content="Caraser – See your street without cars" />
    <meta
      property="og:description"
      content="Upload a street photo and see what it looks like without cars. AI replaces cars with trees, benches, greenery and people."
    />
    <meta property="og:image" content="https://caraser.org/og-image.jpg" />
    <meta property="og:image:secure_url" content="https://caraser.org/og-image.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A street before and after removing cars – replaced with trees, benches and greenery"
    />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Caraser – See your street without cars" />
    <meta
      name="twitter:description"
      content="Upload a street photo and see what it looks like without cars. AI replaces cars with trees, benches, greenery and people."
    />
    <meta name="twitter:image" content="https://caraser.org/og-image.jpg" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Caraser",
        "url": "https://caraser.org/",
        "description": "Upload a street photo and see what it looks like without cars. AI replaces cars with trees, benches, greenery and people."
      }
    </script>
    <!-- ssr:meta:end -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
