<div class="sv-picker">

  <div class="sv-address-bar">
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="sv-address-field">
      <mat-label>Street address</mat-label>
      <input matInput
             [(ngModel)]="address"
             (keyup.enter)="loadStreetView()"
             placeholder="e.g. Keizersgracht 123, Amsterdam" />
    </mat-form-field>
    <button mat-flat-button
            [disabled]="!address.trim() || state() === 'loading' || state() === 'capturing'"
            (click)="loadStreetView()">
      <mat-icon>search</mat-icon> Load
    </button>
  </div>

  <div *ngIf="state() === 'loading'" class="sv-status">
    <mat-spinner diameter="28"></mat-spinner>
    <span>Searching for Street View…</span>
  </div>

  <div *ngIf="state() === 'error'" class="sv-error">
    <mat-icon>error_outline</mat-icon>
    <p>{{ statusMessage() }}</p>
  </div>

  <!-- Panorama container: always in DOM, height driven by CSS -->
  <div #panoramaContainer
       class="sv-panorama"
       [class.sv-panorama--visible]="isPanoramaVisible"></div>

  <ng-container *ngIf="isPanoramaVisible">
    <p *ngIf="statusMessage()" class="sv-capture-warning">
      <mat-icon>warning</mat-icon> {{ statusMessage() }}
    </p>

    <div class="sv-actions">
      <p class="sv-hint">Rotate and pan to frame the view you want, then capture it.</p>
      <button mat-flat-button
              [disabled]="state() === 'capturing'"
              (click)="useThisView()">
        <mat-icon>photo_camera</mat-icon>
        <span *ngIf="state() !== 'capturing'">Use this view</span>
        <span *ngIf="state() === 'capturing'">Capturing…</span>
      </button>
    </div>
  </ng-container>

</div>
