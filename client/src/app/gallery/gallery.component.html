<div class="gallery-container">
  <h1 class="gallery-title">Community Gallery</h1>
  <p class="gallery-sub">Streets reclaimed — before &amp; after</p>

  <div *ngIf="loading() && items().length === 0" class="spinner-wrap">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <p *ngIf="error()" class="error-msg">{{ error() }}</p>

  <p *ngIf="!loading() && items().length === 0 && !error()" class="empty-msg">
    No transformations yet. <a routerLink="/">Be the first to upload!</a>
  </p>

  <div class="gallery-grid">
    <a *ngFor="let item of items(); let i = index" class="gallery-card" [routerLink]="['/t', item.id]">
      <img
        [src]="item.thumbnail_image || item.result_image"
        [alt]="'Transformed street ' + item.id"
        class="gallery-card__img"
        [loading]="i === 0 ? 'eager' : 'lazy'"
      />
      <div class="gallery-card__overlay">
        <mat-icon>compare</mat-icon>
        <span>View comparison</span>
      </div>
    </a>
  </div>

  <div *ngIf="hasNext()" class="load-more">
    <button mat-stroked-button (click)="loadMore()" [disabled]="loading()">
      <mat-icon>expand_more</mat-icon> Load more
    </button>
  </div>
</div>
