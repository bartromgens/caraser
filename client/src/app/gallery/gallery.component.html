<div class="gallery-container">
  <h1 class="gallery-title">Community Gallery</h1>
  <p class="gallery-sub">Streets reclaimed — before &amp; after</p>

  <div
    *ngIf="initialLoading()"
    class="spinner-wrap"
    aria-live="polite"
    aria-label="Loading gallery"
  >
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <p *ngIf="error()" class="error-msg">{{ error() }}</p>

  <section *ngIf="userItems().length > 0" class="gallery-section">
    <h2 class="gallery-section__title">Your gallery</h2>
    <div class="gallery-grid">
      <app-gallery-card
        *ngFor="let item of userItems(); let i = index"
        [src]="item.thumbnail_image || item.result_image"
        [alt]="'Transformed street ' + item.id"
        [itemId]="item.id"
        [imgLoading]="i === 0 ? 'eager' : 'lazy'"
        [imgFetchPriority]="i === 0 ? 'high' : 'auto'"
      />
    </div>
  </section>

  <section *ngIf="featuredItems().length > 0" class="gallery-section">
    <h2 class="gallery-section__title">Featured</h2>
    <div class="gallery-grid">
      <app-gallery-card
        *ngFor="let item of featuredItems(); let i = index"
        [src]="item.thumbnail_image || item.result_image"
        [alt]="'Transformed street ' + item.id"
        [itemId]="item.id"
        [imgLoading]="userItems().length === 0 && i === 0 ? 'eager' : 'lazy'"
        [imgFetchPriority]="userItems().length === 0 && i === 0 ? 'high' : 'auto'"
      />
    </div>
  </section>

  <section class="gallery-section">
    <h2 class="gallery-section__title">Community</h2>

    <p *ngIf="!loading() && items().length === 0 && !error()" class="empty-msg">
      No transformations yet. <a routerLink="/">Be the first to upload!</a>
    </p>

    <div class="gallery-grid">
      <app-gallery-card
        *ngFor="let item of items(); let i = index"
        [src]="item.thumbnail_image || item.result_image"
        [alt]="'Transformed street ' + item.id"
        [itemId]="item.id"
        [imgLoading]="
          userItems().length === 0 && featuredItems().length === 0 && i === 0 ? 'eager' : 'lazy'
        "
        [imgFetchPriority]="
          userItems().length === 0 && featuredItems().length === 0 && i === 0 ? 'high' : 'auto'
        "
      />
    </div>

    <div *ngIf="hasNext()" class="load-more">
      <button mat-stroked-button (click)="loadMore()" [disabled]="loadingMore()">
        <mat-spinner *ngIf="loadingMore()" diameter="18"></mat-spinner>
        <ng-container *ngIf="!loadingMore()">
          <mat-icon>expand_more</mat-icon> Load more
        </ng-container>
      </button>
    </div>
  </section>
</div>
